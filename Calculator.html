<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Calculator</title>
    <link rel="stylesheet" href="calculator-style.css">
</head>
<body>
    <div class="container">
        <div class="calculator">
            <div class="calculator-header">
                <h1>Calculator</h1>
            </div>
            <input type="text" id="display" class="display" placeholder="0" readonly>
            
            <div class="buttons">
                <button class="btn btn-function" onclick="clearDisplay()">C</button>
                <button class="btn btn-function" onclick="deleteLast()">DEL</button>
                <button class="btn btn-function" onclick="appendValue('/')">/</button>
                <button class="btn btn-function" onclick="appendValue('*')">×</button>

                <button class="btn" onclick="appendValue('7')">7</button>
                <button class="btn" onclick="appendValue('8')">8</button>
                <button class="btn" onclick="appendValue('9')">9</button>
                <button class="btn btn-function" onclick="appendValue('-')">−</button>

                <button class="btn" onclick="appendValue('4')">4</button>
                <button class="btn" onclick="appendValue('5')">5</button>
                <button class="btn" onclick="appendValue('6')">6</button>
                <button class="btn btn-function" onclick="appendValue('+')">+</button>

                <button class="btn" onclick="appendValue('1')">1</button>
                <button class="btn" onclick="appendValue('2')">2</button>
                <button class="btn" onclick="appendValue('3')">3</button>
                <button class="btn btn-function" onclick="appendValue('.')">.</button>

                <button class="btn zero" onclick="appendValue('0')">0</button>
                <button class="btn btn-equals" onclick="calculate()"><span>=</span></button>
            </div>
        </div>
    </div>

    <script src="calculator-script.js"></script>
</body>
</html>
