<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A professional portfolio showcasing my projects and skills">
    <title>Portfolio | Siddhant Kalbhor</title>
    <link rel="stylesheet" href="styles.css"> <!-- Link to an external stylesheet -->
</head>
<body>
    <header>
        <h1>Siddhant Kalbhor</h1>
        <nav>
            <ul>
                <li><a href="#about">About</a></li>
                <li><a href="#projects">Projects</a></li>
                <li><a href="#contact">Contact</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section id="about">
            <h2>About Me</h2>
            <p>Welcome to my professional portfolio where I share my work and skills...</p>
        </section>
        
        <section id="projects">
            <h2>Projects</h2>
            <article>
                <h3>Project Title</h3>
                <p>Description of the project and technologies used...</p>
            </article>
            <!-- Repeat for more projects -->
        </section>
        
        <section id="contact">
            <h2>Contact Me</h2>
            <form action="#" method="post" aria-label="Contact Form">
                <label for="name">Name:</label>
                <input type="text" id="name" name="name" required>
                
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>
                
                <button type="submit">Send Message</button>
            </form>
        </section>
    </main>
    
    <footer>
        <p>&copy; 2026 Siddhant Kalbhor. All rights reserved.</p>
